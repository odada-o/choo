const USING_BACKEND = !!(API_BASE && API_BASE.trim());
const LS_KEY = "claude_fwdlp_submissions";

async function storeSubmit(rec){
  if(USING_BACKEND){
    const res = await fetch(API_BASE, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(rec)
    });
    if(!res.ok) throw new Error("server "+res.status);
    return true;
  } else {
    const all = lsLoad();
    const i = all.findIndex(function(x){ return x.person===rec.person; });
    if(i>=0) all[i]=rec; else all.push(rec);
    localStorage.setItem(LS_KEY, JSON.stringify(all));
    return true;
  }
}
async function storeLoadAll(){
  if(USING_BACKEND){
    const res = await fetch(API_BASE, { method:"GET" });
    if(!res.ok) throw new Error("server "+res.status);
    const data = await res.json();
    return Array.isArray(data) ? data : (data.items||data.rows||[]);
  } else {
    return lsLoad();
  }
}
function lsLoad(){
  try{ const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):[]; }catch(e){ return []; }

      +'<h2 style="justify-content:center">\uad00\ub9ac\uc790 \uc804\uc6a9 Admin only</h2>'
      +'<p class="muted" style="margin-bottom:16px">\ube44\ubc00\ubc88\ud638\ub97c \uc785\ub825\ud558\uc138\uc694 / Enter password</p>'
      +'<input type="password" id="pwin" value="'+esc(state.pw)+'" oninput="onPw(this.value)" onkeydown="if(event.key===\'Enter\')tryAuth()" placeholder="Password" style="text-align:center; letter-spacing:.2em">'
      +(state.pwErr?'<div class="err">'+esc(state.pwErr)+'</div>':'')
      +'<div style="margin-top:16px"><button onclick="tryAuth()">\uc811\uc18d Unlock</button></div>'
      +'</div></div>';
  }

  const rows=state.rows||[];
  const submitted = PEOPLE.filter(function(p){ return rows.some(function(r){return r.person===p;}); });
  const missing = PEOPLE.filter(function(p){ return !rows.some(function(r){return r.person===p;}); });

  let h='<div class="card"><div class="topbar"><div>'
    +'<h1 style="font-size:21px">\uc2e0\uccad \ud604\ud669 Dashboard</h1>'
    +'<span class="pill">\ubc29\ud654\ubcbd\u00b7DLP \uc815\ucc45\uc608\uc678</span></div>'
    +'<div class="toolbar">'
    +'<button class="ghost sm" onclick="loadRows()">\uc0c8\ub85c\uace0\uce68</button>'
    +'<button class="sm" onclick="exportCsv()">CSV \ub2e4\uc6b4\ub85c\ub4dc</button>'
    +'<button class="ghost sm" onclick="logout()">\uc7a0\uae08 Lock</button>'
    +'</div></div>'
    +'<div class="modebar">\uc800\uc7a5 \ubaa8\ub4dc: '+(USING_BACKEND
        ?'<span class="on">\uc11c\ubc84 \uc5f0\ub3d9(\uacf5\uc720 \ucde8\ud569)</span>'
        :'<span class="off">\uc784\uc2dc \uc800\uc7a5(\ube0c\ub77c\uc6b0\uc800 \ub85c\uceec)</span> \u2014 \ub2e4\uc778 \ucde8\ud569\uc744 \uc704\ud574 \ubc31\uc5d4\ub4dc(API_BASE) \uc5f0\uacb0 \ud544\uc694')+'</div>';

  if(state.rows===null){ h+='<div class="loading">\ubd88\ub7ec\uc624\ub294 \uc911\u2026</div></div>'; return h; }

  h+='<div class="statgrid">'
    +'<div class="stat green"><div class="n">'+submitted.length+'</div><div class="l">\uc81c\ucd9c \uc644\ub8cc Submitted</div></div>'
    +'<div class="stat amber"><div class="n">'+missing.length+'</div><div class="l">\ubbf8\uc81c\ucd9c Not yet</div></div>'
    +'</div>';

  if(missing.length){
    h+='<h2 style="margin-top:22px"><span class="dot" style="background:var(--danger)"></span>\ubbf8\uc81c\ucd9c\uc790 Not submitted ('+missing.length+')</h2><div class="plist">';
    missing.forEach(function(n){
      h+='<div class="prow"><div class="who"><span class="nm">'+esc(n)+'</span><span class="tm">'+esc(teamOf(n)+" \u00b7 "+roleOf(n))+'</span></div>'
        +'<div class="rowbtns"><span class="badge miss">\ubbf8\uc81c\ucd9c</span></div></div>';
    });
    h+='</div>';
  }

  if(submitted.length){
    h+='<h2 style="margin-top:22px"><span class="dot" style="background:var(--ok)"></span>\uc81c\ucd9c\uc790 Submitted ('+submitted.length+')</h2><div class="plist">';
    submitted.forEach(function(n){
      const r=rows.find(function(x){return x.person===n;});
      const t=(r&&r.submittedAt||"").slice(5,16).replace("T"," ");
      const npc=(r&&r.pcs)?r.pcs.length:0;
      h+='<div class="prow"><div class="who"><span class="nm">'+esc(n)+'</span><span class="tm">'+esc(teamOf(n))+' \u00b7 '+npc+'\ub300</span></div>'
        +'<div class="rowbtns"><span class="muted">'+esc(t)+'</span><span class="badge done">\u2713 \uc81c\ucd9c</span></div></div>';
    });
    h+='</div>';
  }

  if(rows.length){
    h+='<h2 style="margin-top:24px"><span class="dot"></span>\uc0c1\uc138 \ub0b4\uc5ed Details (\uc2e0\uccad\uc11c \ucca8\ubd80\uc6a9)</h2>'
      +'<div style="overflow-x:auto"><table><thead><tr>'
      +'<th>\ubd80\uc11c</th><th>\uc131\uba85</th><th>IP\uc8fc\uc18c</th><th>PC Hostname</th><th>\uc0ac\ubc88</th>'
      +'</tr></thead><tbody>';
    rows.forEach(function(r){
      const pcs=(r.pcs&&r.pcs.length)?r.pcs:[{ip:"",host:""}];
      pcs.forEach(function(pc,i){
        h+='<tr><td>'+esc(i===0?(r.dept||teamOf(r.person)):"")+'</td><td><strong>'+esc(i===0?r.person:"")+'</strong></td>'
          +'<td>'+esc(pc.ip)+'</td><td>'+esc(pc.host)+'</td><td>'+esc(i===0?r.empno:"")+'</td></tr>';
      });
    });
    h+='</tbody></table></div>'
      +'<p class="hint">\u203b CSV \ub2e4\uc6b4\ub85c\ub4dc \ud6c4 \uc2e0\uccad\uc11c \uc591\uc2dd(\ubd80\uc11c/\uc131\uba85/IP\uc8fc\uc18c/PC Hostname/\uc0ac\ubc88)\uc5d0 \ubd99\uc5ec\ub123\uc73c\uc138\uc694.</p>';
  }
  h+='</div>';
  return h;
}

window.setTab=function(t){ state.tab=t; if(t==="admin"&&state.authed){state.rows=null;} render(); };
window.onPerson=function(v){
  state.form.person=v;
  if(v){ const t=teamOf(v); if(!state.form.dept) state.form.dept=t; }
  render();
};
window.setVal=function(k,v){ state.form[k]=v; };
window.setPc=function(idx,k,v){ if(state.form.pcs[idx]) state.form.pcs[idx][k]=v; };
window.addPc=function(){ state.form.pcs.push(blankPc()); render(); };
window.delPc=function(idx){ state.form.pcs.splice(idx,1); if(!state.form.pcs.length) state.form.pcs.push(blankPc()); render(); };
window.resetForm=function(){ state.done=false; state.form=blankForm(); state.err=""; render(); };
window.onPw=function(v){ state.pw=v; };
window.tryAuth=function(){ if(state.pw===ADMIN_PW){ state.authed=true; state.pw=""; state.pwErr=""; state.rows=null; render(); } else { state.pwErr="\ube44\ubc00\ubc88\ud638\uac00 \uc62c\ubc14\ub974\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4 / Incorrect password."; render(); } };
window.logout=function(){ state.authed=false; state.rows=null; render(); };

window.submitForm=async function(){
  if(state.submitting) return;
  const f=state.form;
  if(!f.person){ state.err="\uc131\uba85\uc744 \uc120\ud0dd\ud574\uc8fc\uc138\uc694 / Please select your name."; render(); return; }
  if(!f.dept){ state.err="\ubd80\uc11c\ub97c \uc785\ub825\ud574\uc8fc\uc138\uc694 / Please enter your department."; render(); return; }
  if(!f.empno){ state.err="\uc0ac\ubc88\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694 / Please enter your employee number."; render(); return; }
  const validPcs=f.pcs.filter(function(p){ return (p.ip&&p.ip.trim())||(p.host&&p.host.trim()); });
  if(!validPcs.length){ state.err="\ucd5c\uc18c 1\ub300\uc758 IP\uc8fc\uc18c\uc640 PC Hostname\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694 / Enter at least one device."; render(); return; }
  for(let i=0;i<validPcs.length;i++){
    if(!validPcs[i].ip||!validPcs[i].ip.trim()){ state.err="PC \uc815\ubcf4\uc758 IP\uc8fc\uc18c\ub97c \ubaa8\ub450 \uc785\ub825\ud574\uc8fc\uc138\uc694 / IP address required for each PC."; render(); return; }
    if(!validPcs[i].host||!validPcs[i].host.trim()){ state.err="PC \uc815\ubcf4\uc758 Hostname\uc744 \ubaa8\ub450 \uc785\ub825\ud574\uc8fc\uc138\uc694 / Hostname required for each PC."; render(); return; }
  }

  state.err=""; state.submitting=true; render();
  const rec={ person:f.person, email:emailOf(f.person), dept:f.dept, empno:f.empno, pcs:validPcs,
    period:REQ_PERIOD, fwUrls:FW_URLS, submittedAt:new Date().toISOString() };
  try{
    await storeSubmit(rec);
    state.submitting=false; state.done=true; state.lastDone=rec; render();
  }catch(e){
    state.submitting=false;
    state.err="\uc81c\ucd9c \uc911 \uc624\ub958\uac00 \ubc1c\uc0dd\ud588\uc2b5\ub2c8\ub2e4. \uc7a0\uc2dc \ud6c4 \ub2e4\uc2dc \uc2dc\ub3c4\ud574 \uc8fc\uc138\uc694 / Submit error. Please try again.";
    render();
  }
};

window.loadRows=async function(){
  state.rows=null; render();
  let out=[];
  try{
    const data = await storeLoadAll();
    const seen={};
    (data||[]).forEach(function(obj){
      if(obj && obj.person && !seen[obj.person]){ seen[obj.person]=1; out.push(obj); }
    });
  }catch(e){ out=[]; }
  out.sort(function(a,b){ return String(a.person).localeCompare(String(b.person)); });
  state.rows=out; render();
};

window.exportCsv=function(){
  const rows=state.rows||[]; if(!rows.length){ alert("\ub2e4\uc6b4\ub85c\ub4dc\ud560 \uc81c\ucd9c \ub0b4\uc5ed\uc774 \uc5c6\uc2b5\ub2c8\ub2e4."); return; }
  const head=["\ubd80\uc11c","\uc131\uba85","\uc9c1\uae09","\uc774\uba54\uc77c","\uc0ac\ubc88","IP\uc8fc\uc18c","PC Hostname","\uc81c\ucd9c\uc2dc\uac01"].join(",");
  const lines=[];
  rows.forEach(function(r){
    const pcs=(r.pcs&&r.pcs.length)?r.pcs:[{ip:"",host:""}];
    pcs.forEach(function(pc){
      const vals=[ r.dept||teamOf(r.person), r.person, roleOf(r.person), emailOf(r.person), r.empno||"", pc.ip||"", pc.host||"", r.submittedAt||"" ];
      lines.push(vals.map(function(v){ return '"'+String(v||"").replace(/"/g,'""')+'"'; }).join(","));
    });
  });
  const blob=new Blob(["\uFEFF"+head+"\n"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="Claude_\ubc29\ud654\ubcbdDLP_\ub2e8\ub9d0\uc815\ubcf4_"+REQ_PERIOD+".csv"; a.click();
};

render();
</script>
